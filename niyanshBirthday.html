<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>First Birthday Invitation 🎂</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: 'Comic Sans MS', cursive;
    background: radial-gradient(circle, #ffe6f2, #ff99cc);
}

/* BALLOONS */
.balloon {
    position: absolute;
    bottom: -150px;
    width: 60px;
    height: 80px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #fff, rgba(255,255,255,0.2));
    animation: float 8s ease-in forwards;
}
.balloon::after {
    content: "";
    position: absolute;
    width: 2px;
    height: 60px;
    background: #555;
    left: 50%;
    top: 80px;
}

@keyframes float {
    0% { transform: translateY(0) scale(0.8); opacity: 1; }
    100% { transform: translateY(-120vh) scale(1.1); opacity: 0; }
}

/* ENVELOPE */
.envelope {
    width: 260px;
    height: 160px;
    background: #ff4d6d;
    margin: auto;
    position: absolute;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%);
    cursor: pointer;
    display: none;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    border-radius: 10px;
}

.flap {
    position: absolute;
    width: 100%;
    height: 100%;
    background: #ff1a4d;
    clip-path: polygon(0 0, 100% 0, 50% 60%);
    transform-origin: top;
    transition: 1s;
}

.envelope.open .flap {
    transform: rotateX(180deg);
}

/* CARD */
.card {
    display: none;
    text-align: center;
    padding: 20px;
    animation: fadeIn 2s ease;
}

.card img {
    width: 220px;
    border-radius: 20px;
    border: 6px solid white;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

h1 {
    color: #ff0066;
    font-size: 32px;
}

h2 {
    color: #333;
}

.details {
    margin-top: 20px;
    font-size: 18px;
    background: white;
    padding: 15px;
    border-radius: 15px;
    display: inline-block;
}

@keyframes fadeIn {
    from { opacity: 0; transform: scale(0.8);}
    to { opacity: 1; transform: scale(1);}
}

/* MICKEY DOT BACKGROUND */
.dots {
    position: fixed;
    width: 100%;
    height: 100%;
    background-image: radial-gradient(#ff0066 10%, transparent 10%);
    background-size: 40px 40px;
    opacity: 0.2;
    z-index: -1;
}
</style>
</head>

<body>

<div class="dots"></div>

<div id="balloons"></div>

<div class="envelope" id="envelope">
    <div class="flap"></div>
</div>

<div class="card" id="card">
    <h1>🎉 One Year Completed 🎉</h1>

    <img src="baby.jpg" onerror="this.src='https://via.placeholder.com/200';">

    <h2>You're Invited 💖</h2>

    <div class="details">
        📍 Kandukuri Street,<br>
        Bhaskar Nagar,<br>
        Kadiam<br><br>

        📅 22nd March 2026
    </div>
</div>

<script>
const container = document.getElementById("balloons");

function createBalloon() {
    const b = document.createElement("div");
    b.className = "balloon";

    b.style.left = Math.random() * 100 + "vw";
    b.style.backgroundColor = `hsl(${Math.random()*360},70%,60%)`;

    container.appendChild(b);

    setTimeout(() => b.remove(), 8000);
}

// Burst effect at start
for (let i = 0; i < 40; i++) {
    setTimeout(createBalloon, i * 80);
}

// Show envelope after animation
setTimeout(() => {
    document.getElementById("envelope").style.display = "block";
}, 5000);

// Open envelope
document.getElementById("envelope").onclick = function() {
    this.classList.add("open");

    setTimeout(() => {
        this.style.display = "none";
        document.getElementById("card").style.display = "block";
        document.body.style.overflow = "auto";
    }, 1000);
};
</script>

</body>
</html>
